# ====================================================================================
# FILE: deployment/local/docker-compose.yml
#
# PURPOSE: 
# Local deployment of the Ortholog Operator.
# Currently configured to use Google Cloud Storage (GCS) via Application Default 
# Credentials (ADC) for Merkle tree tiles, with local MinIO commented out.
# ====================================================================================

services:
  # ==================================================================================
  # 1. CORE STATE: PostgreSQL
  # Stores queues, SMT state, and entry indexes. No entry bytes are stored here.
  # ==================================================================================
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ortholog
      POSTGRES_PASSWORD: orthologpassword
      POSTGRES_DB: ortholog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ortholog"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==================================================================================
  # 2. TRILLIAN TESSERA (ACTIVE): GCP Personality
  # The Merkle Tree writer. Hashes entries and writes tiles to your public GCS bucket.
  # ==================================================================================
  tessera:
    # Uses the GCP-specific image from the transparency-dev repository
    image: ghcr.io/transparency-dev/tesseract/gcp:latest
    environment:
      - STORAGE=gcp
      - GCP_PROJECT=legalai-460612
      # The bucket and folder prefix where tiles will be written
      - GCS_BUCKET=legalai-tessera-tiles/my-log-prefix
      # Points the Google Cloud SDK inside the container to your mounted ADC file
      - GOOGLE_APPLICATION_CREDENTIALS=/tmp/adc.json
    volumes:
      # Mount the dummy signing keys required by Tessera (generated via shell script)
      - ./tessera-private.pem:/keys/private.pem:ro
      - ./tessera-public.pem:/keys/public.pem:ro
      # Mount your Mac's local Application Default Credentials file into the container
      - ~/.config/gcloud/application_default_credentials.json:/tmp/adc.json:ro
    command: 
      - "--signer_private_key_file=/keys/private.pem"
      - "--signer_public_key_file=/keys/public.pem"
    ports:
      - "8081:8080"

  # ==================================================================================
  # 3. ROUTING LAYER: Nginx
  # Splits traffic hitting ORTHOLOG_TESSERA_URL. 
  # Writes -> Tessera container. Reads -> Direct to GCS.
  # ==================================================================================
  tessera-router:
    image: nginx:alpine
    volumes:
      - ./nginx-tessera.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "2024:2024"
    depends_on:
      - tessera

  # ==================================================================================
  # 4. ORTHOLOG OPERATOR
  # The core protocol operator. Connects to Postgres and the Nginx Router.
  # ==================================================================================
  operator:
    build:
      context: ../../ # Build from the root of the ortholog-operator repo
      dockerfile: deployment/local/Dockerfile
    environment:
      - ORTHOLOG_LOG_DID=did:ortholog:operator:local:001
      - ORTHOLOG_POSTGRES_DSN=postgres://ortholog:orthologpassword@postgres:5432/ortholog?sslmode=disable
      - ORTHOLOG_TESSERA_URL=http://tessera-router:2024
      - ORTHOLOG_SERVER_ADDR=:8080
      - LOG_LEVEL=debug
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      tessera-router:
        condition: service_started

  # ==================================================================================
  # 5. OFFLINE STORAGE (COMMENTED OUT): Local MinIO & Tessera AWS Personality
  # Uncomment these blocks (and comment out the GCP Tessera block above) to run 
  # a 100% local, offline storage environment using MinIO.
