# ====================================================================================
# FILE: deployment/local/nginx-tessera.conf
#
# PURPOSE: 
# This Nginx configuration acts as the traffic routing layer for the Ortholog Operator.
# The Operator expects a single URL (ORTHOLOG_TESSERA_URL) for both reading and writing.
# This reverse proxy strictly separates that traffic:
#   - WRITES (admissions/tree heads) go to the Trillian Tessera compute container.
#   - READS (static Merkle tree tiles) go directly to the Object Store.
# ====================================================================================

events {
    # Maximum number of simultaneous connections that can be opened by a worker process
    worker_connections 1024;
}

http {
    server {
        # The port Nginx listens on (mapped to 2024 in docker-compose.yml)
        listen 2024;

        # ============================================================================
        # ROUTE 1: DYNAMIC TRAFFIC (WRITES/STATE) -> TRILLIAN TESSERA
        # ============================================================================
        # The Ortholog Operator calls POST /api/v1/add during entry admission,
        # and GET /api/v1/tree/head when checking state. These must be handled
        # by the active Tessera backend service.
        location /api/v1/ {
            # Proxy traffic to the 'tessera' container defined in docker-compose.yml
            proxy_pass http://tessera:8080/api/v1/;
            
            # Preserve the original request headers for proper routing/logging
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ============================================================================
        # ROUTE 2: STATIC TRAFFIC (READS) -> OBJECT STORAGE
        # ============================================================================
        # When the Operator needs to hydrate an entry's canonical bytes, it fetches
        # the static tile by hitting GET /tiles/{level}/{offset}. 
        # We route this directly to the object store, entirely bypassing Tessera's CPU.
        location /tiles/ {
            
            # ------------------------------------------------------------------------
            # ACTIVE CONFIGURATION: Google Cloud Storage (GCS)
            # ------------------------------------------------------------------------
            # Nginx needs a DNS resolver to resolve external HTTPS domains on the fly.
            # 8.8.8.8 is Google's public DNS.
            resolver 8.8.8.8;
            
            # Proxy the request to the public GCS bucket, including the folder prefix.
            # Format: https://storage.googleapis.com/<bucket-name>/<prefix>/tiles/
            proxy_pass https://storage.googleapis.com/legalai-tessera-tiles/my-log-prefix/tiles/;
            
            # GCP strictly requires the Host header to match their API endpoint,
            # otherwise the request will be rejected.
            proxy_set_header Host storage.googleapis.com;
            
            # Optimization: Add caching headers to improve local read performance.
            # Merkle tree tiles are mathematically immutable once written, 
            # so they can be safely cached indefinitely by the local client/browser.
            expires 30d;
            add_header Cache-Control "public, immutable";

            # ------------------------------------------------------------------------
            # PREVIOUS CONFIGURATION: Local MinIO (Commented Out)
            # ------------------------------------------------------------------------
            # To revert to a fully local MinIO object store (no cloud dependency), 
            # comment out the GCS configuration block above, and uncomment these lines:
            #
            # proxy_pass http://minio:9000/tessera-tiles/tiles/;
            # proxy_set_header Host $host;
            # expires 30d;
            # add_header Cache-Control "public, immutable";
        }
    }
}