# deployment/local/nginx-tessera.conf
events {
    worker_connections 1024;
}

http {
    server {
        listen 2024;

        # Route 1: Writes and Tree Head requests go to Trillian Tessera
        location /api/v1/ {
            proxy_pass http://tessera:8080/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Route 2: Tile reads go directly to the MinIO Object Store
        location /tiles/ {
            proxy_pass http://minio:9000/tessera-tiles/tiles/;
            proxy_set_header Host $host;
            
            # Cache immutable tiles locally
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}