# ─────────────────────────────────────────────────────────────────────────────
# FILE PATH: config/operator.yaml
#
# Full operator configuration schema. Override with env vars.
#
# CHANGES: Added did_resolver + schema sections.
#          Shard section deferred to post Phase 6.
# ─────────────────────────────────────────────────────────────────────────────

# Identity
operator:
  log_did: "did:ortholog:operator:001"
  operator_did: "did:ortholog:operator:001:signer"

# Postgres connection
postgres:
  dsn: "postgres://ortholog:ortholog@localhost:5432/ortholog?sslmode=disable"
  replica_dsn: ""
  max_conns: 20
  min_conns: 5
  max_conn_lifetime: "30m"
  max_conn_idle_time: "5m"

# HTTP server
server:
  addr: ":8080"
  read_timeout: "30s"
  write_timeout: "60s"
  shutdown_timeout: "30s"
  max_entry_size: 1048576  # 1MB (SDK-D11)

# Builder loop
builder:
  batch_size: 1000
  poll_interval: "100ms"
  delta_window_size: 10
  commitment_interval: 1000
  commitment_max_age: "1h"

# Admission
admission:
  initial_difficulty: 16
  min_difficulty: 8
  max_difficulty: 24
  low_threshold: 100
  high_threshold: 10000
  adjust_interval: "30s"
  hash_function: "sha256"

# Tessera integration
tessera:
  endpoint: "http://localhost:2024"
  timeout: "30s"
  tile_cache_size: 10000
  tile_storage: object

  object:
    endpoint: ""
    bucket: davidson-cases-tiles
    region: us-east-1
    path_style: false

  filesystem:
    root: /var/lib/tessera/tiles

# Witness configuration
witness:
  endpoints:
    - "http://witness-1:8081"
    - "http://witness-2:8081"
    - "http://witness-3:8081"
  quorum_k: 2
  per_witness_timeout: "30s"
  scheme_tag: 1

# Equivocation monitor
equivocation:
  peer_endpoints: []
  poll_interval: "5m"

# Anchor publisher
anchor:
  enabled: false
  interval: "1h"
  sources: []

# SMT cache warming
smt:
  warm_top_levels: 32
  cache_size: 100000

# ─────────────────────────────────────────────────────────────────────────────
# DID resolution (Phase 4)
# ─────────────────────────────────────────────────────────────────────────────
# When configured, submission handler performs full DID → pubkey → VerifyEntry.
# Empty = Phase 2 trust model (nil DIDResolver, wire format integrity only).
did_resolver:
  endpoint: ""      # Empty = Phase 2 trust model
  method: "http"    # "http" (REST API) or "local" (embedded)
  timeout: "5s"

# ─────────────────────────────────────────────────────────────────────────────
# Schema resolution
# ─────────────────────────────────────────────────────────────────────────────
# SDK's schema.CachingResolver handles this — fetches schema entries,
# checks commutative_operations, returns SchemaResolution.
# Wired in cmd/operator/main.go as schema.NewCachingResolver().
schema:
  enabled: true     # false = all schemas use strict OCC

# Logging
logging:
  level: "info"
  format: "json"
